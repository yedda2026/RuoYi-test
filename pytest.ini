# ===========================================================
# RuoYi 平台接口自动化测试框架
# Pytest 配置文件
# ===========================================================
# 作者：ruoyi-test Team
# 版本：v1.0.0
# ===========================================================

[pytest]
addopts =
    -v
    --tb=short
    --alluredir=reports/allure-results
    --clean-alluredir

testpaths = test_cases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    db_verify: 数据库验证测试用例
    permission: 权限测试用例
    workflow: 工作流测试用例
    smoke: 冒烟测试用例（核心功能快速验证）
    regression: 回归测试用例（完整功能验证）
    integration: 集成测试用例
    user: 用户管理测试用例
    role: 角色管理测试用例
    dept: 部门管理测试用例

log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
