# 当前激活的环境名称，可选值：dev | test
env: test

# -----------------------------------------------------------
# 开发环境配置
# -----------------------------------------------------------
dev:
  # 接口基础地址
  base_url: http://localhost:8080
  # 登录账号信息
  username: admin
  password: admin123

# -----------------------------------------------------------
# 测试环境配置
# -----------------------------------------------------------
test:
  # 接口基础地址
  base_url: http://localhost:8080
  # 登录账号信息
  username: admin
  password: admin123

# -----------------------------------------------------------
# 数据库连接配置
# -----------------------------------------------------------
# 支持 MySQL 数据库连接，用于数据库验证测试
# -----------------------------------------------------------
database:
  # 数据库主机地址
  host: localhost
  # 数据库端口
  port: 3306
  # 数据库用户名
  user: root
  # 数据库密码
  password: root123
  # 数据库名称
  database: ry_cloud
